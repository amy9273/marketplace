<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      href="https://fonts.googleapis.com/css?family=Megrim|Nunito+Sans:400,900"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="https://emojipedia-us.s3.dualstack.us-west-1.amazonaws.com/thumbs/240/apple/155/ear-of-maize_1f33d.png"
    />

    <title>NODE FARM</title>

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: inherit;
      }

      html {
        font-size: 62.5%;
        box-sizing: border-box;
      }

      body {
        padding: 5rem 5rem 10rem;
        line-height: 1.7;
        font-family: 'Nunito Sans', sans-serif;
        color: #333;
        min-height: 100vh;
        background: linear-gradient(135deg, #fd6f73 0%, #fad0c4 100%);
      }

      h1 {
        font-family: 'Megrim', sans-serif;
        font-size: 6rem;
        color: #fff;
        text-align: center;
        position: relative;
        word-spacing: 3px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        margin-bottom: 5rem;
      }

      h1::after {
        content: '';
        display: block;
        height: 4px;
        width: 120px;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        margin: 1.5rem auto 0;
        border-radius: 2px;
      }

      .container {
        width: 95rem;
        margin: 0 auto;
      }

      .cards-container {
        margin-top: 4rem;
      }

      .card {
        background: white;
        box-shadow: 0 1.5rem 4rem 0.5rem rgba(0, 0, 0, 0.12);
        margin-bottom: 4rem;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        border-left: 5px solid #ff9a9e;
      }

      .card__title-box {
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        margin-right: auto;
        display: flex;
        align-items: center;
        padding: 0 3rem;
        flex: 1;
      }

      .card__title {
        font-family: 'Megrim', sans-serif;
        color: white;
        font-size: 2.8rem;
        letter-spacing: 0.5px;
      }

      .card__details {
        display: flex;
        flex-wrap: wrap;
        padding: 1.5rem 2rem;
        background: #f9f9f9;
      }

      .card__detail-box {
        padding: 1rem 2rem;
        border-right: 1px solid #eee;
        display: flex;
        align-items: center;
      }

      .card__detail-box:last-child {
        border: none;
      }

      .card__detail {
        font-weight: 400;
        font-size: 1.7rem;
        color: #555;
      }

      .card__detail--organic {
        font-weight: 900;
        text-transform: uppercase;
        font-size: 1.8rem;
        background-image: linear-gradient(to right, #ff9a9e, #fad0c4);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        background-color: rgba(255, 154, 158, 0.1);
      }

      .card__detail--price {
        font-weight: 900;
        font-size: 2rem;
        color: #ff6b6b;
      }

      .card__link:link,
      .card__link:visited {
        flex: 0 0 auto;
        background-color: #ff9a9e;
        color: white;
        font-size: 1.5rem;
        font-weight: 700;
        text-transform: uppercase;
        text-decoration: none;
        padding: 0 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        letter-spacing: 0.5px;
      }

      .card__link:hover,
      .card__link:active {
        background-color: #ff7b7f;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 2.5rem 6rem 1.5rem rgba(0, 0, 0, 0.15);
        border-left-color: #fddada;
      }

      .emoji-left {
        font-size: 1.8rem;
        margin-right: 0.8rem;
      }

      .emoji-right {
        font-size: 1.8rem;
        margin-left: 0.8rem;
      }

      .not-organic {
        display: none;
      }

      /* ----- button group (overview) ----- */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 2rem;
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      background: white;
      padding: 1.2rem 3rem;
      border-radius: 40px;
      font-size: 1.8rem;
      font-weight: 900;
      text-decoration: none;
      color: #ff6b6b;
      border: 2px solid white;
      transition: all 0.3s;
      box-shadow: 0 1rem 2rem rgba(0,0,0,0.1);
      font-family: 'Megrim', sans-serif;
      letter-spacing: 1px;
    }

    .btn-add:hover {
      background: #ff7b7f;
      color: white;
      border-color: #ff9a9e;
      transform: translateY(-3px);
    }

      @media (max-width: 1000px) {
        .container {
          width: 100%;
          max-width: 800px;
        }
        
        h1 {
          font-size: 4.5rem;
        }
        
        .card {
          flex-direction: column;
        }
      
        
        .card__details {
          flex-direction: column;
        }
        
        .card__detail-box {
          border-right: none;
          border-bottom: 1px solid #eee;
        }
      }

      
    </style>
  </head>

  <body>
    <div class="container">
      <div class="action-bar">
        <a href="/add" class="btn-add">
          <span style="font-size:2.2rem;">➕</span> ADD NEW ITEM
        </a>
      </div>
      <h1>🛒 Local Shop 🛍️</h1>

      <div class="cards-container">
        {%ITEM_CARDS%}
      </div>
    </div>
  </body>
</html>
